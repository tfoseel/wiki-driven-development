<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>예약 완료 목업</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f5f3ed; color: #18211f; }
      main { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
      .panel { background: #fffefa; border: 1px solid #ccd7d1; border-radius: 8px; padding: 28px; }
      .badge { display: inline-block; background: #e7f2ef; color: #08605f; border-radius: 999px; padding: 6px 10px; font-weight: 800; }
      h1 { margin: 16px 0 12px; font-size: 40px; }
      dl { display: grid; grid-template-columns: 120px 1fr; gap: 12px; margin: 24px 0; }
      dt { color: #66736f; }
      dd { margin: 0; font-weight: 700; }
      a { display: inline-block; background: #08605f; color: white; padding: 12px 16px; border-radius: 8px; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <span class="badge">예약 확정</span>
        <h1>예약이 완료되었습니다</h1>
        <dl>
          <dt>서비스</dt><dd>후속 상담</dd>
          <dt>시간</dt><dd>2026-07-01T14:00:00+09:00</dd>
          <dt>요청사항</dt><dd>지난 상담 자료를 먼저 확인해 주세요.</dd>
        </dl>
        <a href="#">예약 관리</a>
      </section>
    </main>
  </body>
</html>
