<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>새 예약 목업</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f5f3ed; color: #18211f; }
      main { max-width: 1120px; margin: 0 auto; padding: 40px 24px; }
      .layout { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 24px; align-items: start; }
      .panel { background: #fffefa; border: 1px solid #ccd7d1; border-radius: 8px; padding: 22px; }
      .step { color: #8a4b2f; font-weight: 750; }
      h1 { margin: 8px 0 12px; font-size: 38px; }
      label { display: grid; gap: 8px; margin-bottom: 16px; font-weight: 700; }
      input, select, textarea { min-height: 44px; border: 1px solid #b9c7c0; border-radius: 8px; padding: 10px 12px; font: inherit; }
      button { min-height: 46px; width: 100%; border: 0; border-radius: 8px; background: #08605f; color: white; font-weight: 800; }
      .helper { color: #66736f; line-height: 1.55; }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <div class="step">1 / 3 · 예약 정보</div>
        <h1>새 예약</h1>
        <p class="helper">선택한 서비스와 가능한 시간을 확인한 뒤 연락처와 요청사항을 입력한다.</p>
      </section>
      <form class="panel">
        <label>시간<select><option>2026-07-01T14:00:00+09:00</option></select></label>
        <label>이름<input value="Jamie Lee" /></label>
        <label>이메일<input value="jamie@example.com" /></label>
        <label>요청사항<textarea>지난 상담 자료를 먼저 확인해 주세요.</textarea></label>
        <button>예약 생성</button>
      </form>
    </main>
  </body>
</html>
